    <!-- ── STRUCTURED DATA: WebSite + Sitelinks Search Box ──
         This is what lets Google show a search bar under your listing.
         The urlTemplate MUST match your actual on-site search route. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://mnmukt.com/",
        "name": "Mnmukt",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://mnmukt.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ── STRUCTURED DATA: WebPage ── -->

    <!-- ── STRUCTURED DATA: Breadcrumb ── -->
    <script type="application/ld+json">

        "itemListElement": [

          }

      }
    </script>

    <!--
      ── PERFORMANCE: Critical CSS inline ──
      Paste your above-the-fold CSS here to eliminate render-blocking.
    -->

    <style>
      /* Standard "visually hidden but accessible/crawlable" pattern for
         the SEO fallback content below. NOT display:none or
         visibility:hidden — those are ignored (or devalued) by crawlers.
         This keeps the text in the DOM and accessibility tree, readable by
         non-JS bots and screen readers, with zero visible footprint for
         sighted users. React overwrites #root's contents on hydration
         anyway, so this only ever matters in the brief pre-hydration
         window and for crawlers that don't run JS at all. */
      .seo-fallback {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!--
        ── SEO SAFETY NET FOR SPAs ──
        Because this is a Vite/React app, this div is empty until JS runs.
        Google can execute JS, but rendering is delayed to a "second wave"
        of indexing and can be skipped under crawl-budget pressure, and
        OTHER crawlers (Bing, LinkedIn, WhatsApp preview bots, some AI
        crawlers) do NOT execute JS at all.

        The content below is wrapped in .seo-fallback so it is visually
        hidden and never flashes on screen before React mounts — it exists
        purely for crawlers. React overwrites this div's contents on
        hydration, so real visitors never see it either way.
      -->
      <div class="seo-fallback">
        <h1>Mnmukt – Premium Ethnic Wear</h1>
        <p>
          Shop handcrafted kurta sets, dresses, co-ord sets, and premium women's
          fashion online.
        </p>
        <nav>
          <a href="/collections">Collections</a>
          <a href="/new-arrivals">New Arrivals</a>
          <a href="/best-sellers">Best Sellers</a>
          <a href="/about">About Us</a>
        </nav>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
