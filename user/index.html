<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── PRIMARY SEO ── -->
    <title>Mnmukt — Premium Ethnic Wear & Lifestyle Store</title>
    <meta
      name="description"
      content="Shop premium ethnic wear, kurta sets, salwar suits & organic lifestyle products at Mnmukt. Handcrafted with care, delivered with love." />
    <meta
      name="keywords"
      content="ethnic wear, kurta sets, salwar suits, organic products, mnmukt, indian fashion, women ethnic wear" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Mnmukt" />

    <!-- ── CANONICAL ── -->
    <link rel="canonical" href="https://mnmukt.com/" />

    <!-- ── PERFORMANCE ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── FONTS ── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet" />

    <!-- ── FAVICON ── -->
    <link rel="icon" href="/appLogo.png" />
    <link rel="apple-touch-icon" href="/appLogo.png" />

    <!-- ── PWA ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#da127d" />
    <!--
      ✅ Replaced deprecated "apple-mobile-web-app-capable" with the standard tag.
      Both are included for maximum compatibility.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mnmukt" />

    <!-- ── OPEN GRAPH ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mnmukt — Premium Ethnic Wear" />
    <meta
      property="og:description"
      content="Shop premium ethnic wear, kurta sets, salwar suits & lifestyle products." />
    <meta property="og:url" content="https://mnmukt.com/" />
    <meta property="og:image" content="https://mnmukt.com/og-cover.png" />

    <!-- ── STRUCTURED DATA ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Mnmukt",
        "url": "https://mnmukt.com/",
        "logo": "https://mnmukt.com/appLogo.png",
        "sameAs": [
          "https://www.instagram.com/mnmukt",
          "https://www.facebook.com/mnmukt"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
